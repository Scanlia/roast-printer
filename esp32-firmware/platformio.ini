; Roast Printer - ESP32-C6 WiFi-to-Serial Bridge
; Receives ESC/POS data over raw TCP (port 9100) and forwards
; it to the Epson TM-T88V via UART → MAX3232 → RS-232.

[env:xiao_esp32c6]
platform = espressif32
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200

; Build flags for WiFi credentials — edit these or move to a
; secrets header before flashing.
build_flags =
    -DWIFI_SSID=\"YOUR_WIFI_SSID\"
    -DWIFI_PASS=\"YOUR_WIFI_PASSWORD\"
    -DPRINTER_BAUD=38400
    -DPRINTER_TX=2
    -DPRINTER_RX=3
    -DLED_BUILTIN_PIN=15
